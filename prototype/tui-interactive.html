<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Skein — Terminal</title>
<style>
/* ============================================================
   Skein CLI — faithful terminal emulator
   A single-column transcript with a bottom bordered prompt,
   inline tool lines, and a spinner status line — the way real
   CLI coding agents (Claude Code, Codex, Aider, Gemini CLI) work.
   ============================================================ */
:root{
  /* graphite loom — terminal palette */
  --bg:#0b0e14; --fg:#c3ccdd; --strong:#eef2fb; --dim:#8794ab; --faint:#5a6478; --ghost:#3d4557;
  --accent:#6ee7d0; --accent-deep:#2dd4bf;
  --ok:#4ade80; --warn:#fbbf24; --err:#fb7185; --info:#60a5fa; --violet:#a78bfa;
  --add:#3fb950; --del:#f85149; --add-bg:#2ea04322; --del-bg:#f8514922;
  --border:#273045; --border-focus:#2dd4bf;
  --mono:"SF Mono","JetBrains Mono","Fira Code",ui-monospace,Menlo,Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--fg);
  font-family:var(--mono); font-size:13px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}
::selection{background:#6ee7d033;color:var(--strong);}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;} ::-webkit-scrollbar-track{background:transparent;}

/* theme toolbar — tiny, out of the way */
#chrome{
  display:flex;align-items:center;gap:8px;padding:5px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;color:var(--faint);font-size:11px;
}
#chrome .tsw{width:12px;height:12px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;}
#chrome .tsw.on{border-color:var(--strong);}
#chrome .tbtn{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;}
#chrome .tbtn:hover{border-color:var(--accent);color:var(--accent);}
#chrome .grow{flex:1;}

/* transcript — single full-width scroll column */
#transcript{flex:1;overflow-y:auto;padding:14px 16px 4px;}
.blk{margin-bottom:12px;white-space:pre-wrap;word-break:break-word;}

/* welcome banner */
.banner{border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:14px;color:var(--dim);}
.banner .b1{color:var(--accent);font-weight:700;}
.banner .b2{color:var(--strong);}
.banner a{color:var(--accent);text-decoration:none;}

/* user turn: › prefix, bold */
.user{display:flex;gap:8px;}
.user .sig{color:var(--accent);font-weight:700;flex-shrink:0;}
.user .txt{color:var(--strong);font-weight:600;}

/* assistant text: ◆ Skein header, indented body */
.asst .hdr{color:var(--accent);font-weight:700;margin-bottom:2px;}
.asst .hdr .streaming{color:var(--dim);font-weight:400;}
.asst .body{padding-left:14px;color:var(--fg);}
.asst .body code{background:#161b28;color:var(--accent);padding:0 4px;border-radius:3px;}
.asst .body .h{color:var(--strong);font-weight:700;display:block;margin:4px 0 2px;}
.asst .body .li{display:block;padding-left:2px;}
.asst .body .li .bullet{color:var(--accent);}
.caret{display:inline-block;width:7px;height:14px;background:var(--accent);vertical-align:-2px;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* tool call: ⏺ name(args)  then ⎿ result (indented) */
.tool .call{display:flex;gap:7px;align-items:baseline;}
.tool .call .g{flex-shrink:0;}
.tool .call .name{color:var(--strong);font-weight:600;}
.tool .call .args{color:var(--dim);}
.tool .call .dur{color:var(--faint);margin-left:6px;font-size:11px;}
.tool .result{padding-left:15px;color:var(--dim);}
.tool .result .lead{color:var(--faint);}
.tool .result.err{color:var(--err);}
.tool .result .more{color:var(--faint);cursor:pointer;}
.tool .result .more:hover{color:var(--accent);}
.tool .result .hidden-lines{display:none;}
.tool .result.expanded .hidden-lines{display:block;}

/* diff inside a tool result */
.diff{margin:3px 0 3px 15px;border-left:1px solid var(--border);}
.diff .dl{padding:0 8px;}
.diff .dl.add{background:var(--add-bg);color:var(--add);}
.diff .dl.del{background:var(--del-bg);color:var(--del);}
.diff .dl.ctx{color:var(--faint);}
.diff .dhdr{color:var(--dim);padding:0 8px 2px;}

/* plan / todo block: rendered like Claude Code's todo list */
.todo{padding-left:14px;}
.todo .row{color:var(--dim);}
.todo .row.done{color:var(--faint);}
.todo .row.done .mark{color:var(--ok);}
.todo .row.now{color:var(--strong);}
.todo .row.now .mark{color:var(--accent);}
.todo .row .mark{display:inline-block;width:16px;}

/* approval prompt (inline, like a permission request) */
.perm{border:1px solid var(--warn);border-left-width:2px;border-radius:6px;padding:8px 12px;margin-left:14px;color:var(--fg);}
.perm .q{color:var(--strong);margin-bottom:4px;}
.perm .opts{display:flex;gap:14px;color:var(--dim);flex-wrap:wrap;}
.perm .opts b{cursor:pointer;font-weight:400;}
.perm .opts b:hover{color:var(--accent);}
.perm .opts .k{color:var(--accent);font-weight:700;}

/* notices */
.notice{color:var(--dim);}
.notice.info{color:var(--info);} .notice.ok{color:var(--ok);} .notice.warn{color:var(--warn);} .notice.err{color:var(--err);}

/* spinner status line — the signature "esc to interrupt" line */
#spinner{padding:2px 16px;color:var(--accent);flex-shrink:0;display:none;}
#spinner.on{display:block;}
#spinner .meta{color:var(--faint);}

/* bottom bordered prompt box — ╭─╮ │ ╰─╯ style */
#composer{padding:6px 12px 4px;flex-shrink:0;}
.pbox{border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px;transition:border-color .15s;background:#0d1119;}
.pbox.focus{border-color:var(--border-focus);box-shadow:0 0 0 1px #2dd4bf22;}
.pbox.shell{border-color:var(--warn);}
.pbox .sig{color:var(--accent);font-weight:700;flex-shrink:0;}
.pbox .sig.shell{color:var(--warn);}
#input{flex:1;background:transparent;border:none;outline:none;color:var(--strong);font-family:var(--mono);font-size:13px;caret-color:var(--accent);}
#input::placeholder{color:var(--ghost);}

/* footer status bar — single line: mode · model · context · cwd */
#footer{display:flex;gap:0;padding:0 16px 6px;color:var(--faint);font-size:11px;align-items:center;flex-shrink:0;}
#footer .seg{color:var(--faint);}
#footer .sep{color:var(--border);margin:0 8px;}
#footer .mode{font-weight:700;}
#footer .mode.build{color:var(--accent);} #footer .mode.plan{color:var(--warn);} #footer .mode.ask{color:var(--dim);}
#footer .grow{flex:1;}
#footer .ctx-ok{color:var(--dim);} #footer .ctx-warn{color:var(--warn);} #footer .ctx-hi{color:var(--err);}

/* command palette — pops above the prompt box */
#palette{margin:0 0 4px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#0d1119;display:none;}
#palette .pi{display:flex;gap:12px;padding:4px 12px;cursor:pointer;align-items:baseline;}
#palette .pi.active,#palette .pi:hover{background:#161b28;}
#palette .pi .c{color:var(--accent);font-weight:600;min-width:110px;}
#palette .pi .d{color:var(--dim);font-size:12px;}
</style>
</head>
<body>

<div id="chrome">
  <span>theme</span>
  <span class="tsw on" style="background:#6ee7d0" title="graphite" onclick="setTheme('graphite')"></span>
  <span class="tsw" style="background:#d6ad72" title="cinder"   onclick="setTheme('cinder')"></span>
  <span class="tsw" style="background:#e7e7e7" title="mono"     onclick="setTheme('mono')"></span>
  <span class="tsw" style="background:#b2b9f0" title="midnight" onclick="setTheme('midnight')"></span>
  <span class="tsw" style="background:#236b8e" title="paper"    onclick="setTheme('paper')"></span>
  <span class="grow"></span>
  <button class="tbtn" onclick="runDemo()">▶ demo</button>
  <button class="tbtn" onclick="cmd('/clear')">clear</button>
</div>

<div id="transcript"></div>

<div id="spinner"><span id="spin-glyph">✻</span> <span id="spin-label">Working</span><span class="meta" id="spin-meta"> … (0s · esc to interrupt)</span></div>

<div id="composer">
  <div id="palette"></div>
  <div class="pbox" id="pbox">
    <span class="sig" id="sig">›</span>
    <input id="input" placeholder="Try a request, / for commands, @ for files — or click ▶ demo" autocomplete="off" spellcheck="false"/>
  </div>
</div>

<div id="footer">
  <span class="mode build" id="f-mode">BUILD</span>
  <span class="sep">·</span>
  <span class="seg" id="f-model">anthropic/claude-opus</span>
  <span class="sep">·</span>
  <span class="seg ctx-ok" id="f-ctx">context 0%</span>
  <span class="grow"></span>
  <span class="seg" id="f-cwd">~/proj/api</span>
</div>

<script>
// ── themes ──────────────────────────────────────────────────────────────────
const THEMES={
  graphite:{'--bg':'#0b0e14','--fg':'#c3ccdd','--strong':'#eef2fb','--dim':'#8794ab','--faint':'#5a6478','--ghost':'#3d4557','--accent':'#6ee7d0','--accent-deep':'#2dd4bf','--ok':'#4ade80','--warn':'#fbbf24','--err':'#fb7185','--info':'#60a5fa','--violet':'#a78bfa','--add':'#3fb950','--del':'#f85149','--add-bg':'#2ea04322','--del-bg':'#f8514922','--border':'#273045','--border-focus':'#2dd4bf'},
  cinder:{'--bg':'#141009','--fg':'#dbd7d1','--strong':'#f6f2ec','--dim':'#aaa39a','--faint':'#837d76','--ghost':'#5a5248','--accent':'#d6ad72','--accent-deep':'#c49a58','--ok':'#8fc38a','--warn':'#e0a35e','--err':'#df7d82','--info':'#7ab0d4','--violet':'#c084a0','--add':'#6aaa65','--del':'#d06060','--add-bg':'#6aaa6522','--del-bg':'#d0606022','--border':'#4a4540','--border-focus':'#c49a58'},
  mono:{'--bg':'#111111','--fg':'#d2d2d2','--strong':'#ffffff','--dim':'#a5a5a5','--faint':'#7d7d7d','--ghost':'#555555','--accent':'#e7e7e7','--accent-deep':'#cccccc','--ok':'#e1e1e1','--warn':'#c5c5c5','--err':'#f0f0f0','--info':'#d0d0d0','--violet':'#bbbbbb','--add':'#c8c8c8','--del':'#f0f0f0','--add-bg':'#c8c8c818','--del-bg':'#f0f0f018','--border':'#484848','--border-focus':'#cccccc'},
  midnight:{'--bg':'#0f0f18','--fg':'#dddde5','--strong':'#f6f5f8','--dim':'#a09faa','--faint':'#7e7d8b','--ghost':'#5a5968','--accent':'#b2b9f0','--accent-deep':'#8892e8','--ok':'#82c79b','--warn':'#d8b773','--err':'#e18a91','--info':'#7ab0d4','--violet':'#c084c0','--add':'#6aaa80','--del':'#d07080','--add-bg':'#6aaa8022','--del-bg':'#d0708022','--border':'#42414b','--border-focus':'#8892e8'},
  paper:{'--bg':'#f4f1ec','--fg':'#30343a','--strong':'#15181c','--dim':'#626a73','--faint':'#8a9099','--ghost':'#b0b8c0','--accent':'#236b8e','--accent-deep':'#1a5070','--ok':'#287a46','--warn':'#8a621b','--err':'#ad3942','--info':'#2060a0','--violet':'#7040a0','--add':'#287a46','--del':'#ad3942','--add-bg':'#287a4618','--del-bg':'#ad394218','--border':'#c8cdd3','--border-focus':'#236b8e'},
};
function setTheme(n){const t=THEMES[n];if(!t)return;Object.entries(t).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));document.querySelectorAll('.tsw').forEach(s=>s.classList.toggle('on',s.title===n));document.body.style.background=t['--bg'];curTheme=n;}
let curTheme='graphite';

// ── state ─────────────────────────────────────────────────────────────────────
let mode='build', ctxPct=0, cost=0, spinTimer=null, spinStart=0, streamTimer=null, busy=false;
const T=document.getElementById('transcript');
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const scroll=()=>{T.scrollTop=T.scrollHeight;};
const clock=()=>{const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');};

// ── rich body renderer (headings, bullets, inline code) ──
function rich(text){
  return text.split('\n').map(ln=>{
    const h=ln.match(/^#{1,4}\s+(.+)$/); if(h) return `<span class="h">${esc(h[1])}</span>`;
    const b=ln.match(/^\s*[-*]\s+(.+)$/); if(b) return `<span class="li"><span class="bullet">•</span> ${inline(b[1])}</span>`;
    return `<span class="li">${inline(ln||' ')}</span>`;
  }).join('');
}
function inline(s){return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>');}

// ── transcript blocks ──
function addUser(text){const d=blk('user');d.innerHTML=`<span class="sig">›</span><span class="txt">${esc(text)}</span>`;}
function addNotice(text,tone='info'){const d=blk('notice '+tone);d.textContent=text;}

function addAsst(){const d=blk('asst');d.innerHTML=`<div class="hdr">◆ Skein <span class="streaming">· streaming</span></div><div class="body"></div>`;return d;}
function streamInto(d,text,onDone){
  const body=d.querySelector('.body'), words=text.split(' '); let i=0;
  (function tick(){
    if(i>=words.length){body.innerHTML=rich(text);d.querySelector('.streaming').remove();if(onDone)onDone();return;}
    body.innerHTML=rich(words.slice(0,i+1).join(' '))+'<span class="caret"></span>';scroll();i++;
    streamTimer=setTimeout(tick,20+Math.random()*30);
  })();
}

function addTool(glyph,name,args,resultLead,resultLines,state='ok',dur){
  const d=blk('tool');
  const gc=state==='err'?'var(--err)':state==='run'?'var(--info)':'var(--ok)';
  const g=state==='run'?'◌':state==='err'?'⏺':'⏺';
  const durTxt=dur?`<span class="dur">${dur}</span>`:'';
  let result='';
  if(resultLead!==undefined){
    const extra=(resultLines||[]).map(l=>esc(l)).join('\n');
    const hidden=extra?`<span class="hidden-lines">\n${extra}</span>`:'';
    const more=extra?` <span class="more" onclick="this.closest('.result').classList.toggle('expanded');this.textContent=this.closest('.result').classList.contains('expanded')?'⌄ less':'› ${(resultLines||[]).length} more lines'">› ${(resultLines||[]).length} more lines</span>`:'';
    result=`<div class="result${state==='err'?' err':''}"><span class="lead">⎿ </span>${esc(resultLead)}${more}${hidden}</div>`;
  }
  d.innerHTML=`<div class="call"><span class="g" style="color:${gc}">${g}</span><span class="name">${esc(name)}</span><span class="args">(${esc(args)})</span>${durTxt}</div>${result}`;
  return d;
}

function addDiff(file,plus,minus,lines){
  const d=blk('tool');
  const dl=lines.map(([t,s])=>`<div class="dl ${t}">${t==='add'?'+':t==='del'?'-':' '} ${esc(s)}</div>`).join('');
  d.innerHTML=`<div class="call"><span class="g" style="color:var(--ok)">⏺</span><span class="name">Update</span><span class="args">(${esc(file)})</span></div>`+
    `<div class="diff"><div class="dhdr">${esc(file)} · <span style="color:var(--add)">+${plus}</span> <span style="color:var(--del)">−${minus}</span></div>${dl}</div>`;
  return d;
}

function addTodo(steps){
  const d=blk('todo');
  d.innerHTML=steps.map(([s,t])=>{
    const mk=s==='done'?'☒':s==='now'?'▸':'☐';
    return `<div class="row ${s}" onclick="cycleTodo(this)"><span class="mark">${mk}</span>${esc(t)}</div>`;
  }).join('');
  return d;
}
function cycleTodo(el){
  const s=el.classList.contains('done')?'done':el.classList.contains('now')?'now':'';
  const nx=['','now','done'][(['','now','done'].indexOf(s)+1)%3];
  el.className='row '+nx;
  el.querySelector('.mark').textContent=nx==='done'?'☒':nx==='now'?'▸':'☐';
}

function addPerm(question,onApply){
  const d=blk('');
  d.innerHTML=`<div class="perm"><div class="q">${esc(question)}</div><div class="opts"><b onclick="permYes(this)"><span class="k">⏎</span> yes</b><b><span class="k">a</span> yes, and don't ask again</b><b onclick="permNo(this)"><span class="k">esc</span> no</b><b><span class="k">e</span> edit</b></div></div>`;
  d._onApply=onApply;
  return d;
}
function permYes(b){const d=b.closest('.blk');d.querySelector('.perm').innerHTML='<span class="notice ok">✓ approved</span>';if(d._onApply)d._onApply();}
function permNo(b){const d=b.closest('.blk');d.querySelector('.perm').innerHTML='<span class="notice err">✕ rejected</span>';}

function blk(cls){const d=document.createElement('div');d.className='blk '+cls;T.appendChild(d);scroll();return d;}

// ── spinner ──
const SPIN=['✻','✽','✢','✳','∗','✻','✽'];
function startSpin(label){
  busy=true; spinStart=Date.now(); let f=0, up=0;
  const el=document.getElementById('spinner'), g=document.getElementById('spin-glyph'), lb=document.getElementById('spin-label'), mt=document.getElementById('spin-meta');
  el.classList.add('on'); lb.textContent=label||'Working';
  spinTimer=setInterval(()=>{
    f=(f+1)%SPIN.length; g.textContent=SPIN[f];
    const s=Math.floor((Date.now()-spinStart)/1000); up+=Math.floor(Math.random()*40);
    mt.textContent=` … (${s}s · ↑${(up/1000).toFixed(1)}k tokens · esc to interrupt)`;
  },120);
}
function stopSpin(){busy=false;clearInterval(spinTimer);document.getElementById('spinner').classList.remove('on');}

// ── footer / context ──
function setCtx(pct){ctxPct=pct;const el=document.getElementById('f-ctx');el.textContent=`context ${pct}%`;el.className='seg '+(pct>=90?'ctx-hi':pct>=75?'ctx-warn':'ctx-ok');}
function setMode(m){
  mode=m;const el=document.getElementById('f-mode');
  el.textContent=m.toUpperCase();el.className='mode '+m;
  document.getElementById('sig').textContent=m==='plan'?'◑':m==='ask'?'○':'›';
  if(m==='plan')addNotice('Plan mode — read-only. I will propose a plan and wait for approval.','warn');
  else if(m==='ask')addNotice('Ask mode — conversational, no file changes.','info');
  else addNotice('Build mode active.','ok');
}

// ── command palette ──
const CMDS=[
  {c:'/help',d:'List commands'},{c:'/clear',d:'Clear the transcript'},
  {c:'/model',d:'Switch model'},{c:'/context',d:'Show context breakdown'},
  {c:'/compact',d:'Compact the conversation'},{c:'/plan',d:'Plan mode'},
  {c:'/ask',d:'Ask mode'},{c:'/build',d:'Build mode'},
  {c:'/init',d:'Generate CLAUDE.md / AGENTS.md'},{c:'/theme',d:'Cycle theme'},
  {c:'/demo',d:'Run demo session'},{c:'/undo',d:'Rewind last checkpoint'},
];
let palItems=[],palIdx=0;
function showPal(items){palItems=items;palIdx=0;const el=document.getElementById('palette');if(!items.length){el.style.display='none';return;}el.style.display='block';renderPal();}
function renderPal(){document.getElementById('palette').innerHTML=palItems.map((it,i)=>`<div class="pi${i===palIdx?' active':''}" onclick="pickPal(${i})"><span class="c">${esc(it.c)}</span><span class="d">${esc(it.d)}</span></div>`).join('');}
function hidePal(){document.getElementById('palette').style.display='none';palItems=[];}
function pickPal(i){const it=palItems[i];if(!it)return;input.value=it.c+' ';hidePal();input.focus();}

// ── input ──
const input=document.getElementById('input'), pbox=document.getElementById('pbox');
input.addEventListener('focus',()=>pbox.classList.add('focus'));
input.addEventListener('blur',()=>pbox.classList.remove('focus'));
input.addEventListener('input',()=>{
  const v=input.value;
  const shell=v.startsWith('!');
  pbox.classList.toggle('shell',shell);
  document.getElementById('sig').textContent=shell?'!':mode==='plan'?'◑':mode==='ask'?'○':'›';
  document.getElementById('sig').className='sig'+(shell?' shell':'');
  if(v.startsWith('/'))showPal(CMDS.filter(c=>c.c.startsWith(v.split(' ')[0])));else hidePal();
});
input.addEventListener('keydown',e=>{
  if(palItems.length){
    if(e.key==='ArrowDown'){e.preventDefault();palIdx=(palIdx+1)%palItems.length;renderPal();return;}
    if(e.key==='ArrowUp'){e.preventDefault();palIdx=(palIdx-1+palItems.length)%palItems.length;renderPal();return;}
    if(e.key==='Tab'||e.key==='Enter'){e.preventDefault();pickPal(palIdx);return;}
    if(e.key==='Escape'){hidePal();return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}
  if(e.key==='Escape'&&busy){stopSpin();if(streamTimer)clearTimeout(streamTimer);addNotice('⎿ Interrupted by user','err');}
});
function submit(){const v=input.value.trim();if(!v)return;input.value='';pbox.classList.remove('shell');hidePal();handle(v);}

function cmd(c){handle(c);}
function handle(v){
  if(v.startsWith('!')){addUser(v);addTool('⚡','Bash',v.slice(1),'(shell output)',[ ],'ok','40ms');return;}
  if(v.startsWith('/')){
    const c=v.split(' ')[0];
    switch(c){
      case '/clear':T.innerHTML='';setCtx(0);banner();return;
      case '/help':addNotice('Commands: '+CMDS.map(x=>x.c).join('  '),'info');return;
      case '/plan':setMode('plan');return;
      case '/ask':setMode('ask');return;
      case '/build':setMode('build');return;
      case '/theme':{const n=Object.keys(THEMES);setTheme(n[(n.indexOf(curTheme)+1)%n.length]);addNotice('Theme: '+curTheme,'ok');return;}
      case '/context':addNotice('Context: 42% · 18k active · 4k tools · pinned: rate-limit.ts, index.ts (survives compaction)','info');return;
      case '/compact':addNotice('✓ Compacted — 8 older messages summarized into ~4k tokens.','ok');setCtx(Math.max(0,ctxPct-30));return;
      case '/model':addNotice('Model routes → plan: claude-opus · edit: gpt-5-codex · embed: local-bge','info');return;
      case '/init':addNotice('✓ Generated AGENTS.md from project structure (42 files scanned).','ok');return;
      case '/undo':addNotice('↩ Rolled back to checkpoint #3 — 2 files restored.','warn');return;
      case '/demo':runDemo();return;
      default:addNotice('Unknown command: '+c,'err');return;
    }
  }
  // normal turn
  addUser(v);
  startSpin('Thinking');
  setTimeout(()=>{
    stopSpin();
    addTool('⏺','Search',v.slice(0,32),'Found 6 matches across 4 files',['src/mw/rate-limit.ts:12','src/mw/index.ts:88','bench/burst.js:4'],'ok','120ms');
    setCtx(28);
    startSpin('Responding');
    setTimeout(()=>{
      stopSpin();
      const a=addAsst();
      streamInto(a,"I'll read the relevant code and trace this.\n\n- Inspect the failing path\n- Find the minimal fix\n- Verify with the project's tests",()=>setCtx(34));
    },1200);
  },1400);
}

// ── demo: the rate-limit bug, as a real CLI session ──
function runDemo(){
  T.innerHTML='';setCtx(0);cost=0;banner();
  let t=0;const at=(ms,fn)=>{t+=ms;setTimeout(fn,t);};

  at(300,()=>addUser('the /limit endpoint returns 500 under load — find the root cause and fix it, keep it minimal'));
  at(400,()=>startSpin('Thinking'));
  at(1400,()=>{stopSpin();
    const a=addAsst();
    streamInto(a,"I'll reproduce it, trace the rate limiter, then patch the smallest thing that fixes it.");
  });
  at(1400,()=>addTodo([['done','Reproduce with a burst of 200 req/s'],['now','Inspect token-bucket refill math'],['','Patch + add a regression test']]));
  at(600,()=>{startSpin('Reading');});
  at(900,()=>{stopSpin();addTool('⏺','Read','src/mw/rate-limit.ts','Read 68 lines',['export function applyLimiter(req, res, next) {','  const now = Date.now();','  const elapsed = now - bucket.last;','  tokens += Math.floor(elapsed / refillMs);','  ...'],'ok','42ms');setCtx(22);});
  at(500,()=>{startSpin('Running');});
  at(1100,()=>{stopSpin();addTool('⚡','Bash','node bench/burst.js','500s begin at ~180 req/s — bucket count goes negative',['  100 req/s → 200 OK','  150 req/s → 200 OK','  180 req/s → 500 (bucket=-3)','  200 req/s → 500 (bucket=-11)'],'ok','1.8s');setCtx(31);});
  at(700,()=>{startSpin('Thinking');});
  at(1500,()=>{stopSpin();
    const a=addAsst();
    streamInto(a,"Root cause: refill uses `Math.floor` on elapsed ms, so sub-tick refills round to zero while the bucket keeps draining — it underflows and every request 500s. Fix: refill with fractional tokens and clamp at zero.",()=>setCtx(38));
  });
  at(1600,()=>{
    addDiff('src/mw/rate-limit.ts',3,2,[
      ['ctx','const elapsed = now - bucket.last;'],
      ['del','tokens += Math.floor(elapsed / refillMs);'],
      ['del','bucket.count = tokens;'],
      ['add','tokens += (elapsed / refillMs) * rate;'],
      ['add','bucket.count = Math.min(capacity, Math.max(0, tokens));'],
      ['add','bucket.last = now;'],
    ]);
  });
  at(300,()=>{
    const p=addPerm('Apply this edit to src/mw/rate-limit.ts?',()=>{
      startSpin('Verifying');
      setTimeout(()=>{stopSpin();addTool('⚡','Bash','npm test -- rate-limit','14 passed, 0 failed',['✓ refills fractionally under load','✓ never goes negative','✓ caps at capacity'],'ok','2.1s');setCtx(41);
        const a=addAsst();streamInto(a,"Done. The bucket now refills fractionally and clamps at zero — burst test holds 200 OK through 250 req/s. One-line-equivalent fix, regression test added.");
      },2200);
    });
  });
}
